<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissors </title>
    <link rel="stylesheet" href="10-rock-paper-scissor.css">
   
</head>
<body>
    <p class="title"> Rock Paper Scissors</p>
    <button 
    onclick=" 
    playGame('rock');
    " class="move-button">
    <img src="images/rock.png" class="move-icon">
    </button>
    <button onclick="
    playGame('paper');
    " class="move-button">
    <img src="images/paper.png" class="move-icon">
    </button>
    <button onclick="
    playGame('scissors');
    " class="move-button">
    <img src="images/scissors.png" class="move-icon">
    </button>
    <!--to show the result -->
    <P class="js-result result" ></P>
    <!--to show the moves both used-->
    <p class="js-moves"></p>
    <!--p to show score-->
    <p class="js-score score"></p>
    <button class="reset-score-button" onclick="
    score.wins=0;
    score.losses=0;
    score.ties=0; 
    localStorage.removeItem('score'); 
    updateScoreElement();
    ">Reset Score</button>

    <script src="10-rock-paper-scissors.js"></script>
</body>
</html>
